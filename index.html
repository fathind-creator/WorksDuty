<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fath's Works Duty</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase v8 SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; min-height: 100vh; }
        .glass-panel { background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.7); border-radius: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 16px; transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px 0 rgba(0, 0, 0, 0.1); }
        .glass-input { background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 12px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col p-4 md:p-6 min-h-screen">

    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 bg-slate-900/50 backdrop-blur z-[100] flex justify-center items-center p-4">
        <div class="bg-white p-10 rounded-3xl shadow-2xl text-center max-w-sm">
            <h1 class="text-3xl font-extrabold mb-2">Fath's Works Duty</h1>
            <p class="text-slate-500 mb-8 text-sm">Masuk untuk mengakses workspace Anda.</p>
            <button onclick="loginWithGoogle()" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg hover:bg-blue-700">Lanjutkan dengan Google</button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainApp" class="hidden flex-col w-full h-full flex-1">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-extrabold">Workspace</h1>
            <button onclick="logout()" class="text-sm font-bold text-red-500">Keluar</button>
        </div>
        <!-- Konten aplikasi Anda di sini -->
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA17rN56mr3e-qQi4GW-pR9tWK_Sz4PK34",
            authDomain: "faths-work-duty.firebaseapp.com",
            projectId: "faths-work-duty",
            storageBucket: "faths-work-duty.firebasestorage.app",
            messagingSenderId: "1021350807893",
            appId: "1:1021350807893:web:4a13adf5bcdb322e9447dc"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Autentikasi
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('flex');
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        function loginWithGoogle() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(err => {
                alert("Login gagal: " + err.message);
            });
        }

        function logout() {
            auth.signOut();
        }

        // Fungsi lainnya (renderApp, saveToStorage, dll...)
    </script>
</body>
</html>
